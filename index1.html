const genId = () => {
  let s = "";
  for(let i=0;i<6;i++) s += "ABCDEFGHJKLMNPQRSTUVWXYZ0123456789"[Math.floor(Math.random()*34)];
  return s;
}
const getLink = (id) => `${location.origin}${location.pathname}?id=${id}`

// Charge PeerJS (exact comme ton code)
const loadPeer = async () => {
  try {
    let m = await import('https://esm.sh/peerjs@1.5.2');
    return m.default || m.Peer || m;
  } catch {
    if(window.Peer) return window.Peer;
    return await new Promise((res, rej) => {
      let s = document.createElement('script');
      s.src = 'https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js';
      s.onload = () => res(window.Peer);
      s.onerror = rej;
      document.head.appendChild(s);
    });
  }
}

  joinError: '',

  logoSize: 'M', // S | M | L

  // Viewer

  vMsg: '',
  remoteStream: null,
  viewerMuted: false,
  vQuality: 'Auto',

}

let refs = {
  preview: null,
  remote: null,
  viewerBox: null,
  display: null, // MediaStream de l'écran
  peer: null,
  calls: []
}

// ===================== RENDER =====================
function render(){
  const app = document.getElementById('app');
  app.innerHTML = isViewer ? renderViewer() : renderBroadcaster();
  cacheDom();
  bindEvents();
  // Re-attache les streams après render (important)
  requestAnimationFrame(() => setTimeout(() => {
    if(!isViewer && refs.display && refs.preview){
      refs.preview.srcObject = refs.display;
      refs.preview.muted = true;
      refs.preview.play().catch(()=>{});
    }
    if(isViewer && state.remoteStream && refs.remote){
      refs.remote.srcObject = state.remoteStream;
      refs.remote.play().catch(()=>{});
    }
  }, 100));
}

// ===================== DOM CACHE & EVENTS =====================
function cacheDom(){
  refs.preview = document.getElementById('preview');
  refs.remote = document.getElementById('remote');
  refs.viewerBox = document.getElementById('viewerBox');
}

function bindEvents(){
  // Diffuseur
  document.getElementById('startBtn')?.addEventListener('click', startBroadcast);
  document.getElementById('stopBtn')?.addEventListener('click', stopAll);
  document.getElementById('copyLink')?.addEventListener('click', copyLink);
  document.getElementById('joinBtn')?.addEventListener('click', joinStream);
  document.getElementById('joinInput')?.addEventListener('input', e=>state.joinId=e.target.value.toUpperCase());
  document.getElementById('logoFile')?.addEventListener('change', e=>{
    const file=e.target.files[0]; if(!file) return;
    const r=new FileReader(); r.onload=()=>{ state.logoSrc=r.result; render(); }; r.readAsDataURL(file);
  });
  document.getElementById('removeLogo')?.addEventListener('click', ()=>{ state.logoSrc=null; render(); });
  document.querySelectorAll('.qbtn').forEach(b=>b.addEventListener('click', e=>{ state.quality=e.currentTarget.dataset.q; render(); }));

  // Viewer
  document.getElementById('muteBtn')?.addEventListener('click', ()=>{ state.viewerMuted=!state.viewerMuted; if(refs.remote) refs.remote.muted=state.viewerMuted; });
  document.getElementById('fsBtn')?.addEventListener('click', ()=>{ if(!document.fullscreenElement) refs.viewerBox.requestFullscreen(); else document.exitFullscreen(); });
}

// ===================== LOGIQUE STREAM - TON CODE QUI MARCHE =====================
async function startBroadcast(){
  if(state.status==='requesting') return;
  state.status='requesting'; state.error=''; render();
  try{
    // Code exact qui marche: getDisplayMedia direct
    const stream = await navigator.mediaDevices.getDisplayMedia({
      video:{cursor:'always', frameRate:{ideal:30}},
      audio:true
    });
    refs.display = stream;
    if(refs.preview){ refs.preview.srcObject=stream; refs.preview.muted=true; refs.preview.play().catch(()=>{}); }

    const roomId = genId();
    const PeerClass = await loadPeer();
    const peer = new PeerClass(roomId, {config:{iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]}});
    refs.peer = peer;
    refs.calls = [];

    peer.on('open', (id)=>{ state.roomId=id; state.status='live'; render(); });
    peer.on('connection', (conn)=>{
      conn.on('open', ()=>{
        state.viewers++;
        try{
          const call = peer.call(conn.peer, stream);
          refs.calls.push({conn, call, peerId:conn.peer});
        }catch(e){ console.error(e); refs.calls.push({conn, peerId:conn.peer}); }
        render();
        conn.on('close', ()=>{ state.viewers=Math.max(0,state.viewers-1); refs.calls=refs.calls.filter(c=>c.peerId!==conn.peer); render(); });
      });
    });
    peer.on('call', (call)=>{ call.answer(stream); });
    peer.on('error', (err)=>{ if(err.type==='unavailable-id'){ state.error='ID pris'; state.status='error'; render(); } });

    stream.getVideoTracks()[0].onended = ()=>stopAll();

  }catch(e){
    console.error(e);
    state.error = e.name==='NotAllowedError' ? 'Partage refusé' : e.message;
    state.status='error'; render();
  }
}

function stopAll(){
  try{ refs.display?.getTracks().forEach(t=>t.stop()); }catch{}
  try{ refs.peer?.destroy(); }catch{}
  refs.display=null; refs.calls=[]; state.viewers=0; state.roomId=''; state.status='idle'; render();
}

function copyLink(){
  const url = getLink(state.roomId);
  navigator.clipboard.writeText(url).then(()=>{
    state.copied=true; render();
    setTimeout(()=>{ state.copied=false; render(); },2000);
  });
}

function joinStream(){
  const id = document.getElementById('joinInput')?.value.trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
  if(!id || id.length<3){ state.joinError='ID trop court'; render(); return; }
  location.href=`${location.pathname}?id=${id}`;
}

// Viewer logic - ton code qui marche
async function initViewer(){
  if(!isViewer) return;
  state.vStatus='connecting'; state.vMsg=`Connexion à ${ROOM}...`; render();
  try{
    const PeerClass = await loadPeer();
    const dummy = new MediaStream();
    const peer = new PeerClass({config:{iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]}});
    refs.peer = peer;
    peer.on('open', ()=>{
      const conn = peer.connect(ROOM);
      conn.on('open', ()=>{
        state.vStatus='waiting'; state.vMsg='En attente du flux...'; render();
        const call = peer.call(ROOM, dummy);
        call.on('stream', (remote)=>{
          state.remoteStream=remote; state.vStatus='connected'; render();
        });
      });
      conn.on('error', ()=>{ state.vStatus='notfound'; state.vMsg='Introuvable'; render(); });
    });
    peer.on('call', (call)=>{
      call.answer(dummy);
      call.on('stream', (remote)=>{ state.remoteStream=remote; state.vStatus='connected'; render(); });
    });
    peer.on('error', (err)=>{ if(err.type==='peer-unavailable'){ state.vStatus='notfound'; render(); } });
  }catch(e){ state.vStatus='error'; render(); }
}

// Pub rotation
setInterval(()=>{
  if(!isViewer) return;
  state.adIndex=(state.adIndex+1)%CONFIG.ads.length;
  const img=document.getElementById('adImg');
  if(img) img.src=CONFIG.ads[state.adIndex];
}, 4000);

// Init
render();
if(isViewer) initViewer();
</script>
